name: Deploy to Production

on:
  push:
    branches:
      - deployment

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: |
          touch .env
          pnpm build --filter=!@nodebase/client

      - name: Create .rsync-exclude
        run: |
          cat > .rsync-exclude << 'EOF'
          .git
          node_modules
          .env
          .env.*
          apps/client
          apps/server/src
          apps/execution-engine/src
          packages/*/src
          packages/*/tsconfig.json
          apps/*/tsconfig.json
          *.md
          biome.json
          turbo.json
          docker-compose.yaml
          .github
          deployment.sh
          ecosystem.config.cjs
          EOF

      - name: Deploy to server via rsync
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete --exclude-from=.rsync-exclude
          path: ./
          remote_path: /home/${{ secrets.SSH_USER }}/flowmation/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /home/${{ secrets.SSH_USER }}/deployment.sh